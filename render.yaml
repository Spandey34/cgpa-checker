services:
  # Backend API
  - type: web
    name: cgpa-checker-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false  # Set in Render dashboard
      - key: CLERK_SECRET_KEY
        sync: false  # Set in Render dashboard
      - key: CLERK_WEBHOOK_SECRET
        sync: false  # Set in Render dashboard
      - key: CLIENT_URL
        sync: false  # Set to your frontend URL

  # Frontend (Static Site)
  - type: web
    name: cgpa-checker-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false  # Set in Render dashboard
      - key: VITE_API_URL
        sync: false  # Set to your backend URL + /api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
